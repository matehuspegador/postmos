name: Build postmarketOS - Moto Edge 30 (dubai)

on:
  workflow_dispatch: {}
  # Descomente para builds semanais automáticos:
  # schedule:
  #   - cron: '0 0 * * 5'   # toda sexta à meia-noite UTC

env:
  KERNEL_REPO: https://gitlab.com/sahaRatul/moto_dubai_linux_mainline_kernel.git
  KERNEL_BRANCH: sm7325_moto_dubai_pmos
  DEVICE_PMAPORTS_REPO: https://gitlab.com/sahaRatul/device-motorola-dubai.git
  DEVICE_PMAPORTS_BRANCH: master
  PMOS_UI: console        # troque para phosh, plasma-mobile, etc se quiser
  PMOS_HOSTNAME: motorola-dubai

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # limite do runner gratuito é 360min/6h
    steps:
      - name: Liberar espaço em disco no runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune -a -f || true
          df -h

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git python3 python3-pip qemu-user-static binfmt-support \
            bc bison flex libssl-dev libelf-dev ccache build-essential \
            clang lld llvm kpartx android-sdk-libsparse-utils expect

      - name: Cache do ccache (acelera builds seguintes do kernel)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-dubai-${{ github.run_id }}
          restore-keys: |
            ccache-dubai-

      # ---------------------------------------------------------------
      # 1) Instalar o pmbootstrap
      #    postmarketOS migrou do gitlab.com para gitlab.postmarketos.org
      #    em out/2024. Clonar de gitlab.com falha (exit code 1) e aborta
      #    o job — por isso o clone abaixo aponta para o domínio novo.
      # ---------------------------------------------------------------
      - name: Instalar pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git ~/pmbootstrap
          sudo ln -sf ~/pmbootstrap/pmbootstrap.py /usr/local/bin/pmbootstrap
          pmbootstrap --version

      # ---------------------------------------------------------------
      # 2) Rodar "pmbootstrap init" (é o primeiro passo na thread,
      #    antes de qualquer clone de kernel/device)
      # ---------------------------------------------------------------
      - name: Inicializar pmbootstrap de forma não interativa
        run: |
          # pmbootstrap init é um wizard interativo. Em CI é mais simples
          # responder via "expect". Ajuste os prompts conforme a versão
          # do pmbootstrap (ver `pmbootstrap init --help`).
          cat > /tmp/pmb_init.exp <<'EOF'
          set timeout -1
          spawn pmbootstrap init
          expect "Work path"
          send "\r"
          expect "vendor"
          send "motorola\r"
          expect "device codename"
          send "dubai\r"
          expect "correct"
          send "y\r"
          expect "aarch64"
          send "\r"
          expect "kernel"
          send "mainline\r"
          expect "User interface"
          send "$env(PMOS_UI)\r"
          expect "hostname"
          send "$env(PMOS_HOSTNAME)\r"
          expect "Zap Existing Chroots"
          send "y\r"
          expect eof
          EOF
          expect -f /tmp/pmb_init.exp || {
            echo "::warning::pmbootstrap init interativo falhou; ajuste o script expect para a versão atual do pmbootstrap (os prompts mudam entre releases)."
            exit 1
          }

      # ---------------------------------------------------------------
      # 3) Clonar a config do device (motorola-dubai) e copiar para
      #    dentro do pmaports local do pmbootstrap, como na thread
      # ---------------------------------------------------------------
      - name: Clonar pacote pmaports do device (motorola-dubai)
        run: |
          git clone --depth=1 -b "${DEVICE_PMAPORTS_BRANCH}" "${DEVICE_PMAPORTS_REPO}" ~/device-motorola-dubai

      - name: Copiar pacote do device para o pmaports local
        run: |
          PMAPORTS_DEVICE_DIR=~/.local/var/pmbootstrap/cache_git/pmaports/device/testing/device-motorola-dubai
          mkdir -p "$PMAPORTS_DEVICE_DIR"
          cp -r ~/device-motorola-dubai/* "$PMAPORTS_DEVICE_DIR"/

      # ---------------------------------------------------------------
      # 4) Clonar o kernel mainline com patches (sahaRatul)
      # ---------------------------------------------------------------
      - name: Clonar kernel mainline (sahaRatul, branch sm7325_moto_dubai_pmos)
        run: |
          git clone --depth=1 -b "${KERNEL_BRANCH}" "${KERNEL_REPO}" ~/kernel

      # ---------------------------------------------------------------
      # 5) Compilar o kernel exatamente como na thread:
      #    envkernel.sh -> make defconfig -> make -jN
      # ---------------------------------------------------------------
      - name: Compilar o kernel (make)
        run: |
          export CCACHE_DIR=~/.ccache
          export USE_CCACHE=1
          cd ~/kernel
          source ~/pmbootstrap/helpers/envkernel.sh
          make sm7325_moto_dubai_defconfig
          make -j"$(nproc)"

      # ---------------------------------------------------------------
      # 6) Empacotar o kernel compilado como pacote pmOS
      # ---------------------------------------------------------------
      - name: Empacotar o kernel para o postmarketOS
        run: |
          cd ~/kernel
          source ~/pmbootstrap/helpers/envkernel.sh
          pmbootstrap build --envkernel linux-next

      # ---------------------------------------------------------------
      # 7) Compilar o pacote do device (rootfs base)
      # ---------------------------------------------------------------
      - name: Compilar o pacote do device (rootfs base)
        run: |
          pmbootstrap build device-motorola-dubai

      # ---------------------------------------------------------------
      # 8) Passo final da thread antes do boot: dentro do chroot do
      #    rootfs, editar /usr/share/initramfs/init_functions.sh para
      #    o initramfs conseguir montar a raiz corretamente.
      #    A thread faz isso interativamente com vi/nano dentro de
      #    "pmbootstrap chroot -r"; aqui rodamos via "pmbootstrap chroot --"
      #    para funcionar sem interação em CI.
      #    ATENÇÃO: a thread não deixa claro (no texto disponível) qual é
      #    a linha exata alterada em init_functions.sh — confirme o trecho
      #    certo direto no post do XDA antes de rodar em produção, e
      #    ajuste o sed abaixo de acordo.
      # ---------------------------------------------------------------
      - name: Ajustar init_functions.sh no chroot do rootfs
        run: |
          echo "::warning::Confira no post do XDA a linha exata a alterar em /usr/share/initramfs/init_functions.sh antes de habilitar este passo em produção."
          # Exemplo de como rodar o ajuste de forma não interativa (ajuste o sed conforme necessário):
          # pmbootstrap chroot -r -- sed -i 's/PADRAO_ANTIGO/PADRAO_NOVO/' /usr/share/initramfs/init_functions.sh

      # ---------------------------------------------------------------
      # 9) Gerar a imagem final e exportar os artefatos
      # ---------------------------------------------------------------
      - name: Gerar a imagem final (boot.img + rootfs)
        run: |
          pmbootstrap install --no-fde --password 147147
          pmbootstrap export
          cp -rL /tmp/postmarketOS-export ~/pmos-export

      - name: Enviar artefatos
        uses: actions/upload-artifact@v4
        with:
          name: postmarketos-motorola-dubai
          path: ~/pmos-export
          retention-days: 7
